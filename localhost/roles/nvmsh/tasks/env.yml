---
  - name: Set nvmsh environment variable
    ansible.builtin.blockinfile:
      append_newline: true
      prepend_newline: true
      state: present
      path: "{{ bashrc.env }}"
      marker: "# {mark} Nvmsh"
      block: |
        export NVM_DIR="{{ directory.iac }}/nvm"
        export NVM_BIN="{{ directory.iac }}/nvm/bin"

  - name: Set nvmsh environment util
    ansible.builtin.blockinfile:
      append_newline: true
      prepend_newline: true
      state: present
      path: "{{ bashrc.util }}"
      marker: "# {mark} Nvmsh"
      block: |
        source "$NVM_DIR/nvm.sh"
